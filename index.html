<!DOCTYPE html>
<html lang="ka"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+GO:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>

<header class="main-header">
    <div class="container">
        
        <div class="logo">
            <img src="images/main-logo.svg" alt="Manufactura">
        </div>

        <nav class="main-nav">
            <ul>
                <li class="active"><a href="#">მთავარი</a></li>
                <li><a href="#">კატალოგი</a></li>
                <li><a href="#">თარგები</a></li>
                <li><a href="#">ჩვენს შესახებ</a></li>
                <li><a href="#">კონტაქტი</a></li>
            </ul>
        </nav>

        <div class="header-right">
             <div class="user-actions">
                <div class="search-container">
    <a href="#" class="search-trigger" id="searchBtn">
        <i class="fa-solid fa-magnifying-glass"></i>
    </a>
    
    <div class="search-dropdown" id="searchDropdown">
        <input type="text" placeholder="ჩაწერეთ საძიებო სიტყვა..." class="search-input">
        <button type="submit" class="search-submit">ძებნა</button>
    </div>
</div>

    <a href="#"><i class="fa-regular fa-user"></i></a>
    
    <div class="wishlist-wrapper" id="wishlistWrapper">
    <a href="#" id="wishlistBtn">
        <i class="fa-regular fa-heart"></i>
    </a>

    <div class="wishlist-dropdown" id="wishlistDropdown">
        <div class="wishlist-header">ჩემი ფავორიტები</div>
        <div class="wishlist-items">
            <p class="empty-msg">თქვენი სია ცარიელია</p>
        </div>
        <a href="wishlist.html" class="btn-all-wishlist">ყველას ნახვა</a>
    </div>
</div>
    

    <div class="cart-wrapper" id="cartWrapper">
    <a href="#" id="cartBtn">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-badge">2</span>
    </a>

    <div class="cart-dropdown" id="cartDropdown">
        <div class="cart-items">
            <div class="cart-item">
                <img src="images/product1.jpg" alt="პროდუქტი">
                <div class="item-info">
                    <p class="item-name">ტყავის საფულე "ალგეთი"</p>
                    <p class="item-price">1 x 85.00 ₾</p>
                </div>
            </div>
        </div>
        
        <div class="cart-total">
            <span>ჯამი:</span>
            <span>85.00 ₾</span>
        </div>
        
        <div class="cart-actions">
            <a href="cart.html" class="btn-view-cart">კალათის ნახვა</a>
            <a href="checkout.html" class="btn-checkout">ყიდვა</a>
        </div>
    </div>
</div>
</div>
</div>

    </div>
</header>

    <section class="hero-section">
        
        </div>
    </section>

 <section class="home-gallery">
    <div class="gallery-container">
        <div class="gallery-item">
            <img src="images/1.jpg" alt="ხელნაკეთი ნივთი">
        </div>

        <div class="gallery-item">
            <img src="images/2.jpg" alt="ხელნაკეთი ნივთი">
        </div>
        
        <div class="gallery-item">
            <img src="images/3.jpg" alt="ხელნაკეთი ნივთი">
        </div>

        <div class="gallery-item">
            <img src="images/4.jpg" alt="ხელნაკეთი ნივთი">
        </div>

        <div class="gallery-item wide">
            <img src="images/5.jpg" alt="ხელნაკეთი ნივთი">
        </div>
    </div>
</section>





<script>
    // 1. სქროლის ეფექტი (ოპტიმიზებული - მხოლოდ ერთი ვერსია)
    window.addEventListener('scroll', function() {
        const header = document.querySelector('.main-header');
        // window.scrollY უფრო თანამედროვეა, ვიდრე pageYOffset
        if (window.scrollY > 50) {
            header.classList.add('scrolled');
        } else {
            header.classList.remove('scrolled');
        }
    });

    // ელემენტების სელექტორები
    const searchBtn = document.getElementById('searchBtn');
    const searchDropdown = document.getElementById('searchDropdown');
    const searchContainer = document.querySelector('.search-container');

    const cartBtn = document.getElementById('cartBtn');
    const cartDropdown = document.getElementById('cartDropdown');
    const cartWrapper = document.getElementById('cartWrapper');

    const wishlistBtn = document.getElementById('wishlistBtn');
    const wishlistDropdown = document.getElementById('wishlistDropdown');
    const wishlistWrapper = document.getElementById('wishlistWrapper');

    // დამხმარე ფუნქცია ყველა დროპდაუნის დასახურავად
    function closeAllDropdowns() {
        if (searchDropdown) searchDropdown.classList.remove('active');
        if (cartDropdown) cartDropdown.classList.remove('active');
        if (wishlistDropdown) wishlistDropdown.classList.remove('active');
    }

    // 2. ძიების ლოგიკა
    if (searchBtn && searchDropdown) {
        searchBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            const isActive = searchDropdown.classList.contains('active');
            closeAllDropdowns(); // ჯერ ვხურავთ ყველას
            if (!isActive) {
                searchDropdown.classList.add('active');
                searchDropdown.querySelector('input').focus();
            }
        });
    }

    // 3. კალათის ლოგიკა
    if (cartBtn && cartDropdown) {
        cartBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            const isActive = cartDropdown.classList.contains('active');
            closeAllDropdowns();
            if (!isActive) cartDropdown.classList.add('active');
        });
    }

    // 4. ფავორიტების ლოგიკა
    if (wishlistBtn && wishlistDropdown) {
        wishlistBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            const isActive = wishlistDropdown.classList.contains('active');
            closeAllDropdowns();
            if (!isActive) wishlistDropdown.classList.add('active');
        });
    }

    // 5. სხვაგან დაკლიკებაზე დახურვა (უნივერსალური)
    document.addEventListener('click', function(e) {
        if (searchContainer && !searchContainer.contains(e.target) && 
            cartWrapper && !cartWrapper.contains(e.target) && 
            wishlistWrapper && !wishlistWrapper.contains(e.target)) {
            closeAllDropdowns();
        }
    });
</script>



</body>
</html>
